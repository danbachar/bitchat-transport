name: bootstrap_anchor
description: Always-on bootstrap anchor server for Bitchat P2P network. Acts as a well-connected friend for signaling, address reflection, and hole-punch coordination.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  # Ed25519 signing & verification (same as bitchat_transport)
  cryptography: ^2.9.0

  # UUID generation for packet IDs
  uuid: ^4.2.0

  # UDX reliable streams over UDP (local package, same as bitchat_transport)
  dart_udx:
    path: ../dart-udx

  # CLI argument parsing
  args: ^2.4.0
